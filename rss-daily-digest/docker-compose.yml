services:
  rss-digest:
    image: rss-daily-digest:latest
    container_name: rss-daily-digest
    env_file:
      - .env
    environment:
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./output:/app/output
    restart: "no"
